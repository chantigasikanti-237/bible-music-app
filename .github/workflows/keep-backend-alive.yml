name: Keep Render backend alive

# Render's free tier spins the backend down after ~15 min idle, and the next
# request pays a 30-50s+ cold-start cost (see DEPLOYMENT.md "Known free-tier
# limits"). Pinging /health well inside that window keeps it warm at no cost,
# instead of paying for Render's $7/mo always-on plan.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://bible-music-app-1.onrender.com/health)
          echo "Backend responded with HTTP $code"
          if [ "$code" -lt 200 ] || [ "$code" -ge 500 ]; then
            echo "::warning::Backend health check returned $code"
          fi
