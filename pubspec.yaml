name: bible_app
description: A Bible and Christian Songs App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  flutter_dotenv: ^6.0.0

  # ?? Advanced Audio Engine
  just_audio: ^0.9.36

  # ?? Backend + Hybrid Support
  http: ^1.2.0
  html: ^0.15.5
  flutter_secure_storage: ^9.2.4
  connectivity_plus: ^5.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  just_audio_background: ^0.0.1-beta.17
  provider: ^6.1.5+1
  share_plus: ^12.0.1
  youtube_explode_dart: ^3.1.0
  youtube_player_iframe: ^6.0.2
  audio_service: ^0.18.18
  webview_flutter: ^4.4.4
  webview_flutter_web: ^0.2.3+4

dependency_overrides:
  # webview_flutter_android 2.x uses the removed v1 Flutter embedding and lacks
  # the namespace required by AGP 8+. Force the v3 line which fixes both issues.
  webview_flutter_android: ^3.16.0
  webview_flutter: ^4.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/env/.env
    - assets/audio/en/
    - assets/audio/te/
    - lib/data/en.json
    - lib/data/te.json
    - lib/data/songs.json
